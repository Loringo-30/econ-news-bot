name: Economic News Bot

# 毎日 7:00 JST (= 22:00 UTC 前日) と 21:00 JST (= 12:00 UTC) に実行
on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 JST (朝刊)
    - cron: '0 12 * * *'   # 21:00 JST (夕刊)
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the news bot
        env:
          # AI (DeepSeek)
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: 'deepseek-chat'
          # SMTP
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_ADDR: ${{ secrets.FROM_ADDR }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          TO_ADDRS:  ${{ secrets.TO_ADDRS }}
          # Behavior
          LOOKBACK_HOURS: '14'
          MACRO_COUNT: '5'
          CORPORATE_GEO_COUNT: '5'
          MAX_ITEMS_TO_AI: '150'
          LOG_LEVEL: 'INFO'
        run: python econ_news_bot.py
