name: Keepalive

# This workflow runs weekly to keep the repository "active" so GitHub
# doesn't auto-disable the cron schedule after 60 days of inactivity.
# It does this by creating an empty commit -- no actual changes are made.

on:
  schedule:
    # Every Monday at 03:00 UTC (= 12:00 JST Monday noon)
    - cron: '0 3 * * 1'
  # Allow manual run as well
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create empty keepalive commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: weekly keepalive [skip ci]"
          git push
